name: コミットメッセージlint（PR）

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: commitlint-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  commitlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Commitlint
        env:
          FROM_SHA: ${{ github.event.pull_request.base.sha }}
          TO_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "Linting commits from ${FROM_SHA} to ${TO_SHA}"
          npx commitlint --from "${FROM_SHA}" --to "${TO_SHA}"
